<div class="projects-page container-custom section">
    <h1 class="mb-5">Meine Projekte</h1>
    <div class="projects-grid">
        @for (projekt of projekte; track projekt) {
            <a class="card-custom project-card project-card-link" [routerLink]="['/projekte', projekt.slug]">
                <h2>{{ projekt.name }}</h2>
                <p class="project-problem">
                    <strong>Problem:</strong> {{ projekt.problem }}
                </p>
                <p class="project-solution">
                    <strong>Lösung:</strong> {{ projekt.solution }}
                </p>
                <div class="tech-stack">
                    @for (tech of projekt.techstack; track tech) {
                        <span>{{ tech }}</span>
                    }
                </div>
                <div class="project-links mt-3">
                    @if (projekt.github) {
                        <a [href]="projekt.github" target="_blank">
                            GitHub →
                        </a>
                    }
                    @if (projekt.demo) {
                        <a [href]="projekt.demo" target="_blank">
                            Live Demo →
                        </a>
                    }
                </div>
            </a>
        }
    </div>
</div>
